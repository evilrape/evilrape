<!DOCTYPE html>
<html>
<head>
  <title>Evil Test Community</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Inter', calibri;
      text-align: center;
      margin-top: 100px;
      background-color: rgb(4, 4, 4);
      background-image: radial-gradient(
        circle at 50% 20%,
      rgba(180, 0, 0, 0.3) 0%,
      rgba(180, 0, 0, 0.18) 8%,
      rgba(180, 0, 0, 0.08) 18%,
      rgba(180, 0, 0, 0.02) 30%,
          transparent 50%
);
      background-attachment: fixed;
      cursor:crosshair;
    }

    h1 {
      color: rgb(255, 255, 255);
      font-weight: 400;
      font-size: 2.5rem;
      text-shadow: 0 0 30px #ff0000;
      margin-bottom: 10px;
    }

    p {
      color: rgb(200, 200, 200);
      text-shadow: 0 0 10px rgb(255, 0, 0);
      font-size: 1rem;
    }

.downloadButton {
  background-color: rgba(120, 0, 0, 0.6);
  color: #ffdddd;
  border: 1px solid rgba(180, 0, 0, 0.4);
  box-shadow: 0 0 18px rgba(200, 0, 0, 0.5);
  width: 300px;
  padding: 12px 24px;
  font-size: 1.1rem;
  font-weight: 600;
  line-height: 1;
  border-radius: 4px;
  cursor: crosshair;
  align-self: center;
  margin-top: 1px;
  transition: background-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
}

.downloadButton:hover {
  background-color: rgba(160, 0, 0, 0.7);
  box-shadow: 0 0 30px rgba(220, 0, 0, 0.75);
  transform: translateY(-1px);
}

  </style>
</head>
<body>
  <h1>Evil Test Community</h1>
  <p>For Test. By Test.</p>
  
  <button class="downloadButton">Enter The Test Zone</button>
</body>
</html>
